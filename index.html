<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maqueta de App de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Mi Lista de Tareas</h1>
    </header>
    <main>
        <aside class="sidebar">
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Categorías</a></li>
                    <li><a href="#">Configuración</a></li>
                </ul>
            </nav>
        </aside>
        <section class="tasks">
            <article class="task">
                <h2 class="title">Comprar GTA VI</h2>
                <span class="category">Ocio</span>
                <span class="badge high">Muy Alta</span>
            </article>
            <article class="task">
                <h2 class="title">Revisar correo</h2>
                <span class="category">Trabajo</span>
                <span class="badge medium">Media</span>
            </article>
            <article class="task">
                <h2 class="title">Llamar al médico</h2>
                <span class="category">Salud</span>
                <span class="badge low">Baja</span>
            </article>
        </section>
    </main>
</body>
</html>
