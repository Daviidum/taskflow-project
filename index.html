<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MisTareas ✨</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Tailwind CDN with custom config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans:  ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            lavender: { 100: '#f0ebff', 200: '#e8e0ff', 300: '#c4b5f4', 500: '#9b7fe8', 700: '#734fc0' },
            rose:     { 100: '#fde8ef', 200: '#fbcfe8', 300: '#f7a8b8', 500: '#e8849a' },
            mint:     { 300: '#a8e6cf', 500: '#5fbf8d' },
            sky:      { 200: '#b3d9f7' },
            peach:    { 200: '#ffd6b0', 300: '#ffba80' },
          },
          keyframes: {
            slideIn: {
              from: { opacity: '0', transform: 'translateY(10px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              from: { opacity: '0' },
              to:   { opacity: '1' },
            },
          },
          animation: {
            'slide-in': 'slideIn 0.3s ease forwards',
            'fade-in':  'fadeIn 0.4s ease forwards',
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h2   { font-family: 'Playfair Display', serif; }

    /* Progress ring animation */
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ring-bg { fill: none; stroke-width: 8; }
    .progress-ring { transform: rotate(-90deg); }
    .ring-text-group {
      transform: rotate(90deg);
      transform-origin: 50px 50px;
    }

    /* Priority left border via pseudo-element */
    .task-item { position: relative; overflow: hidden; }
    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: #c4b5f4;
      transition: width 0.2s;
    }
    .task-item:hover::before { width: 6px; }
    .task-item[data-priority="high"]::before   { background: #e8849a; }
    .task-item[data-priority="medium"]::before { background: #ffba80; }
    .task-item[data-priority="low"]::before    { background: #5fbf8d; }

    /* Checkmark after for checked state */
    .custom-check.checked::after {
      content: '✓';
      font-size: 0.75rem;
      color: white;
      font-weight: 700;
    }

    /* Slide in animation for task items */
    .task-item { animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4b5f4; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #734fc0; }

    /* Background radial gradients (light mode only) */
    body:not(.dark) {
      background-image:
        radial-gradient(ellipse at 10% 0%,  rgba(196,181,244,.22) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(247,168,184,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%,  rgba(168,230,207,.10) 0%, transparent 70%);
    }
  </style>
</head>

<body class="bg-stone-100 dark:bg-neutral-950 text-stone-900 dark:text-stone-100 min-h-screen transition-colors duration-300">

  <!-- ───────────────── HEADER ───────────────── -->
  <header class="sticky top-0 z-50 flex items-center justify-between px-10 py-5
                 bg-white/80 dark:bg-neutral-900/95 backdrop-blur-xl
                 border-b border-stone-200 dark:border-neutral-800
                 transition-colors duration-300">

    <!-- Logo -->
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-base
                  bg-gradient-to-br from-lavender-300 to-rose-300
                  shadow-[0_4px_20px_rgba(140,100,200,.25)]">✦</div>
      <span class="font-serif text-lg font-bold text-stone-900 dark:text-white">
        Mi<span class="text-lavender-500 dark:text-lavender-300">s Tareas</span>
      </span>
    </div>

    <!-- Stats -->
    <div class="flex gap-3 max-sm:hidden">
      <div class="stat-pill flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-medium
                  bg-stone-200 dark:bg-neutral-800 text-stone-500 dark:text-stone-400 transition-colors duration-300">
        📋 Total: <strong class="text-stone-800 dark:text-white ml-0.5" id="stat-total">0</strong>
      </div>
      <div class="stat-pill flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-medium
                  bg-stone-200 dark:bg-neutral-800 text-stone-500 dark:text-stone-400 transition-colors duration-300">
        ✅ Hechas: <strong class="text-stone-800 dark:text-white ml-0.5" id="stat-done">0</strong>
      </div>
      <div class="stat-pill flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-medium
                  bg-stone-200 dark:bg-neutral-800 text-stone-500 dark:text-stone-400 transition-colors duration-300">
        🔥 Hoy: <strong class="text-stone-800 dark:text-white ml-0.5" id="stat-today">0</strong>
      </div>
    </div>

    <!-- Theme toggle -->
    <button id="theme-toggle"
            class="p-2 rounded-xl border-none cursor-pointer text-base transition-all duration-200 active:scale-95
                   bg-stone-200 dark:bg-neutral-800 hover:bg-stone-300 dark:hover:bg-neutral-700"
            title="Alternar modo oscuro" aria-label="Cambiar tema">
      <span id="theme-icon">🌙</span>
    </button>
  </header>

  <!-- ───────────────── LAYOUT ───────────────── -->
  <div class="max-w-6xl mx-auto px-6 py-8 pb-12">
    <div class="grid gap-6" style="grid-template-columns: 270px 1fr;">

      <!-- ───────── SIDEBAR ───────── -->
      <aside class="flex flex-col gap-4">

        <!-- Progress Widget -->
        <div class="widget bg-white dark:bg-neutral-900 rounded-2xl p-5
                    shadow-[0_4px_24px_rgba(140,100,200,.1)] dark:shadow-[0_8px_32px_rgba(140,100,200,.18)]
                    border border-lavender-100 dark:border-neutral-800 transition-colors duration-300">
          <div class="font-serif text-base text-stone-900 dark:text-white mb-4">📊 Progreso</div>
          <div class="flex justify-center mb-2">
            <svg width="100" height="100" class="progress-ring">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%"   stop-color="#c4b5f4"/>
                  <stop offset="100%" stop-color="#f7a8b8"/>
                </linearGradient>
              </defs>
              <circle class="ring-bg stroke-lavender-100 dark:stroke-neutral-700" cx="50" cy="50" r="35"/>
              <circle class="ring-fill" cx="50" cy="50" r="35" id="ring"/>
              <g class="ring-text-group">
                <text id="ring-pct"
                      class="font-serif font-bold"
                      x="50" y="47"
                      style="font-size:1.4rem;font-family:'Playfair Display',serif;font-weight:700;fill:currentColor;dominant-baseline:central;text-anchor:middle;"
                      fill="#1c1917">0%</text>
                <text x="50" y="60"
                      style="font-size:0.65rem;fill:#78716f;text-anchor:middle;dominant-baseline:central;"
                      id="ring-sub">completado</text>
              </g>
            </svg>
          </div>
        </div>

        <!-- Categories Widget -->
        <div class="widget bg-white dark:bg-neutral-900 rounded-2xl p-5
                    shadow-[0_4px_24px_rgba(140,100,200,.1)] dark:shadow-[0_8px_32px_rgba(140,100,200,.18)]
                    border border-lavender-100 dark:border-neutral-800 transition-colors duration-300">
          <div class="font-serif text-base text-stone-900 dark:text-white mb-4">🏷️ Categorías</div>
          <div id="cat-list" class="flex flex-col gap-1">

            <button class="cat-btn active group flex items-center justify-between px-3 py-1.5 rounded-xl border-none cursor-pointer
                           text-sm font-medium transition-all duration-200
                           bg-lavender-100 dark:bg-neutral-800 text-stone-900 dark:text-white
                           hover:bg-lavender-100 dark:hover:bg-neutral-700"
                    data-cat="all" onclick="filterCat(this,'all')">
              <span class="flex items-center gap-2.5">
                <span class="w-2 h-2 rounded-full bg-lavender-300"></span>Todas
              </span>
              <span class="bg-lavender-100 dark:bg-neutral-700 text-stone-500 dark:text-stone-400
                           rounded-full px-2 py-0.5 text-[0.7rem] font-semibold" id="cnt-all">0</span>
            </button>

            <button class="cat-btn group flex items-center justify-between px-3 py-1.5 rounded-xl border-none cursor-pointer
                           text-sm text-stone-500 dark:text-stone-400 transition-all duration-200
                           hover:bg-lavender-100 dark:hover:bg-neutral-800 hover:text-stone-900 dark:hover:text-white"
                    data-cat="personal" onclick="filterCat(this,'personal')">
              <span class="flex items-center gap-2.5">
                <span class="w-2 h-2 rounded-full bg-rose-300"></span>Personal
              </span>
              <span class="bg-lavender-100 dark:bg-neutral-700 text-stone-500 dark:text-stone-400
                           rounded-full px-2 py-0.5 text-[0.7rem] font-semibold" id="cnt-personal">0</span>
            </button>

            <button class="cat-btn group flex items-center justify-between px-3 py-1.5 rounded-xl border-none cursor-pointer
                           text-sm text-stone-500 dark:text-stone-400 transition-all duration-200
                           hover:bg-lavender-100 dark:hover:bg-neutral-800 hover:text-stone-900 dark:hover:text-white"
                    data-cat="trabajo" onclick="filterCat(this,'trabajo')">
              <span class="flex items-center gap-2.5">
                <span class="w-2 h-2 rounded-full bg-sky-200"></span>Trabajo
              </span>
              <span class="bg-lavender-100 dark:bg-neutral-700 text-stone-500 dark:text-stone-400
                           rounded-full px-2 py-0.5 text-[0.7rem] font-semibold" id="cnt-trabajo">0</span>
            </button>

            <button class="cat-btn group flex items-center justify-between px-3 py-1.5 rounded-xl border-none cursor-pointer
                           text-sm text-stone-500 dark:text-stone-400 transition-all duration-200
                           hover:bg-lavender-100 dark:hover:bg-neutral-800 hover:text-stone-900 dark:hover:text-white"
                    data-cat="salud" onclick="filterCat(this,'salud')">
              <span class="flex items-center gap-2.5">
                <span class="w-2 h-2 rounded-full bg-mint-300"></span>Salud
              </span>
              <span class="bg-lavender-100 dark:bg-neutral-700 text-stone-500 dark:text-stone-400
                           rounded-full px-2 py-0.5 text-[0.7rem] font-semibold" id="cnt-salud">0</span>
            </button>

            <button class="cat-btn group flex items-center justify-between px-3 py-1.5 rounded-xl border-none cursor-pointer
                           text-sm text-stone-500 dark:text-stone-400 transition-all duration-200
                           hover:bg-lavender-100 dark:hover:bg-neutral-800 hover:text-stone-900 dark:hover:text-white"
                    data-cat="hogar" onclick="filterCat(this,'hogar')">
              <span class="flex items-center gap-2.5">
                <span class="w-2 h-2 rounded-full bg-peach-200"></span>Hogar
              </span>
              <span class="bg-lavender-100 dark:bg-neutral-700 text-stone-500 dark:text-stone-400
                           rounded-full px-2 py-0.5 text-[0.7rem] font-semibold" id="cnt-hogar">0</span>
            </button>

          </div>
        </div>

        <!-- Quote Widget -->
        <div class="widget rounded-2xl p-5 border-none
                    bg-gradient-to-br from-lavender-100 to-rose-100
                    dark:bg-gradient-to-br dark:from-indigo-900 dark:to-orange-950
                    shadow-[0_4px_24px_rgba(140,100,200,.1)]
                    transition-colors duration-300">
          <div class="font-serif text-base text-stone-900 dark:text-white mb-3">💬 Inspiración</div>
          <p class="font-serif text-sm leading-relaxed text-stone-900 dark:text-white mb-2" id="quote-text">
            "El secreto de salir adelante es comenzar."
          </p>
          <p class="text-xs text-stone-500 dark:text-stone-300" id="quote-author">— Mark Twain</p>
        </div>

      </aside>

      <!-- ───────── MAIN ───────── -->
      <main class="flex flex-col gap-4">

        <!-- Add Task Card -->
        <div class="bg-white dark:bg-neutral-900 rounded-2xl p-6
                    shadow-[0_4px_24px_rgba(140,100,200,.1)] dark:shadow-[0_8px_32px_rgba(140,100,200,.18)]
                    border border-lavender-100 dark:border-neutral-800 transition-colors duration-300">
          <h2 class="text-lg text-stone-900 dark:text-white mb-4">✨ Nueva tarea</h2>
          <div class="flex gap-3 flex-wrap">
            <input
              type="text"
              id="task-input"
              placeholder="¿Qué tienes que hacer hoy?"
              class="flex-1 min-w-40 px-4 py-2.5 text-sm
                     border-[1.5px] border-lavender-100 dark:border-neutral-700 rounded-xl
                     bg-stone-50 dark:bg-neutral-800
                     text-stone-900 dark:text-white placeholder-stone-400 dark:placeholder-stone-500
                     outline-none transition-all duration-200
                     focus:border-lavender-300 focus:ring-2 focus:ring-lavender-300/25
                     dark:focus:border-lavender-300 dark:focus:ring-lavender-300/30"
            />
            <select id="priority-select"
                    class="px-4 py-2.5 text-sm
                           border-[1.5px] border-lavender-100 dark:border-neutral-700 rounded-xl
                           bg-stone-50 dark:bg-neutral-800
                           text-stone-900 dark:text-white
                           outline-none transition-all duration-200 cursor-pointer
                           focus:border-lavender-300 focus:ring-2 focus:ring-lavender-300/25">
              <option value="medium">🟡 Media</option>
              <option value="high">🔴 Alta</option>
              <option value="low">🟢 Baja</option>
            </select>
            <select id="cat-select"
                    class="px-4 py-2.5 text-sm
                           border-[1.5px] border-lavender-100 dark:border-neutral-700 rounded-xl
                           bg-stone-50 dark:bg-neutral-800
                           text-stone-900 dark:text-white
                           outline-none transition-all duration-200 cursor-pointer
                           focus:border-lavender-300 focus:ring-2 focus:ring-lavender-300/25">
              <option value="personal">Personal</option>
              <option value="trabajo">Trabajo</option>
              <option value="salud">Salud</option>
              <option value="hogar">Hogar</option>
            </select>
            <button onclick="addTask()"
                    class="px-5 py-2.5 text-sm font-semibold text-white whitespace-nowrap rounded-xl
                           bg-gradient-to-r from-lavender-300 to-rose-300
                           shadow-[0_4px_14px_rgba(196,181,244,.45)]
                           border-none cursor-pointer transition-all duration-150
                           hover:-translate-y-0.5 hover:shadow-[0_6px_20px_rgba(196,181,244,.55)]
                           active:scale-[0.97]">
              + Añadir
            </button>
          </div>
        </div>

        <!-- Tasks List Card -->
        <div class="bg-white dark:bg-neutral-900 rounded-2xl p-6 flex-1
                    shadow-[0_4px_24px_rgba(140,100,200,.1)] dark:shadow-[0_8px_32px_rgba(140,100,200,.18)]
                    border border-lavender-100 dark:border-neutral-800 transition-colors duration-300">

          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg text-stone-900 dark:text-white">📌 Lista de tareas</h2>
            <button onclick="clearDone()"
                    class="text-xs text-stone-500 dark:text-stone-400 bg-transparent border-none cursor-pointer
                           px-2.5 py-1 rounded-lg transition-all duration-150
                           hover:bg-rose-100 dark:hover:bg-rose-900/30 hover:text-rose-500 dark:hover:text-rose-300">
              Borrar completadas
            </button>
          </div>

          <!-- Search -->
          <div class="relative mb-4">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 dark:text-stone-500 pointer-events-none text-sm">🔍</span>
            <input
              type="text"
              id="filter-input"
              placeholder="Buscar tarea..."
              oninput="renderTasks()"
              class="w-full pl-10 pr-4 py-2.5 text-sm
                     border-[1.5px] border-lavender-100 dark:border-neutral-700 rounded-xl
                     bg-white dark:bg-neutral-800
                     text-stone-900 dark:text-white placeholder-stone-400 dark:placeholder-stone-500
                     outline-none transition-all duration-200
                     focus:border-lavender-300 focus:ring-2 focus:ring-lavender-300/25"
            />
          </div>

          <!-- Task list -->
          <ul id="task-list" class="flex flex-col gap-2.5 list-none p-0 m-0"></ul>

        </div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
